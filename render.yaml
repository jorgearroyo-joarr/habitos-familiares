services:
  - type: web
    name: habitosfam
    env: python
    buildCommand: ./build.sh
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health-public
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: ADMIN_PIN
        sync: false
      - key: DEBUG
        value: "False"
      - key: PYTHON_VERSION
        value: "3.11.10"
      - key: NODE_VERSION
        value: "20.18.0"

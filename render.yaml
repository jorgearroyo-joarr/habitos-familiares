services:
  - type: web
    name: habitosfam
    env: python
    buildCommand: |
      cd frontend && npm install && npm run build
      cd .. && pip install -r requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        value: sqlite:///./habitosfam.db
      - key: ADMIN_PIN
        value: 1234
      - key: DEBUG
        value: "False"

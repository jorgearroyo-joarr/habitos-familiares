# Ruff configuration for HábitosFam
# Applies Configuration over Convention by explicitly defining project standards.

line-length = 88
target-version = "py311"

[lint]
# Enable Pyflakes (F) and a subset of the pycodestyle (E) codes by default.
# Also enable Bugbear (B), Isort (I), and Upgrade (UP).
select = [
    "E",    # pycodestyle errors
    "W",    # pycodestyle warnings
    "F",    # pyflakes
    "I",    # isort
    "B",    # flake8-bugbear
    "UP",   # pyupgrade
    "S",    # flake8-bandit (security)
    "ANN",  # flake8-annotations
    "PT",   # flake8-pytest-style
    "RET",  # flake8-return
    "SIM",  # flake8-simplify
]

ignore = [
    "S101",   # Use of assert detected (needed for pytest)
    "B008",   # Do not perform function call in argument defaults (FastAPI Depends)
    "ANN101", # Missing type annotation for self in method
    "ANN102", # Missing type annotation for cls in classmethod
    "ANN401", # Dynamically typed expressions (Any) are disallowed
    "UP035",  # Import from `typing` instead of `collections.abc` (for older python compatibility if needed)
]

[lint.isort]
known-first-party = ["backend"]
section-order = ["future", "standard-library", "third-party", "first-party", "local-folder"]

[lint.flake8-annotations]
allow-star-arg-any = true

[format]
quote-style = "double"
indent-style = "space"
skip-magic-trailing-comma = false
line-ending = "auto"
